  <script><![CDATA[
    (function () {
      var svg = document.documentElement;
      if (!svg || !svg.createSVGPoint) return;

      svg.classList.add("interactive");

      var cx = 600, cy = 630;
      var ringIds = ["ring-inner", "ring-middle", "ring-outer"];
      var active = null;

      function angleFromPoint(evt) {
        var pt = svg.createSVGPoint();
        pt.x = evt.clientX;
        pt.y = evt.clientY;
        var p = pt.matrixTransform(svg.getScreenCTM().inverse());
        return Math.atan2(p.y - cy, p.x - cx) * 180 / Math.PI + 90;
      }

      function readRotation(el) {
        var transform = el.getAttribute("transform") || "";
        var match = transform.match(/rotate\(([-0-9.]+)/);
        return match ? parseFloat(match[1]) : 0;
      }

      ringIds.forEach(function(id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.addEventListener("pointerdown", function(evt) {
          evt.preventDefault();
          active = {
            el: el,
            startAngle: angleFromPoint(evt),
            startRotation: readRotation(el)
          };
          el.classList.add("dragging");
          if (el.setPointerCapture) {
            try { el.setPointerCapture(evt.pointerId); } catch (e) {}
          }
        });
      });

      svg.addEventListener("pointermove", function(evt) {
        if (!active) return;
        evt.preventDefault();
        var now = angleFromPoint(evt);
        var delta = now - active.startAngle;
        var rot = active.startRotation + delta;
        active.el.setAttribute("transform", "rotate(" + rot + " " + cx + " " + cy + ")");
      });

      function stopDrag() {
        if (!active) return;
        active.el.classList.remove("dragging");
        active = null;
      }

      svg.addEventListener("pointerup", stopDrag);
      svg.addEventListener("pointercancel", stopDrag);
      svg.addEventListener("pointerleave", stopDrag);
    })();
  ]]></script>
</svg>
